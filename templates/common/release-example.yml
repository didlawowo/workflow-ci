# Drop this file at .github/workflows/release.yml in your app repo.
# Adjust `version-files` to match your project (or remove it to only tag).

name: release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (no commit/tag/push)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    uses: didlawowo/workflow-ci/.github/workflows/release.yml@v1
    with:
      # Each line is `path:regex` with a single capture group around the version.
      # Examples — uncomment the lines that fit your project:
      version-files: |
        # pyproject.toml:^version = "(.+)"$
        # package.json:"version": "(.+)"
        # Chart.yaml:^version: (.+)$
        # VERSION:^(.+)$
      tag-prefix: "v"
      # Guard for typed boolean: when triggered by `push:`, `inputs` is null
      # and `null || false` may leak a non-boolean to the strictly-typed input.
      dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || false }}
