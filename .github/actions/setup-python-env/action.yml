name: "Setup Python Environment"
description: "Setup Python with uv and install dependencies"

inputs:
  python-version:
    description: "Python version to install"
    required: false
    default: "3.12"
  install-dev:
    description: "Install dev dependencies"
    required: false
    default: "true"

outputs:
  python-version:
    description: "Python version installed"
    value: ${{ steps.setup.outputs.python-version }}

runs:
  using: "composite"
  steps:
    # Self-hosted ARC runners mount /home/runner/.cache/uv from a persistent
    # PVC (see arc-runners-project.yaml in infra repo). We explicitly disable
    # setup-uv's own caching and pin the cache path so the action does not
    # silently override UV_CACHE_DIR — that way `uv sync` writes to the PVC
    # and survives across jobs without any actions/cache WAN round-trip.
    #
    # On GitHub-hosted runners the path simply lives in the ephemeral home;
    # no behaviour change there beyond not paying for a GHA cache upload.
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
        enable-cache: false
        cache-local-path: /home/runner/.cache/uv

    - name: Set up Python
      id: setup
      shell: bash
      run: |
        uv python install ${{ inputs.python-version }}
        echo "python-version=${{ inputs.python-version }}" >> "$GITHUB_OUTPUT"

    - name: Install dependencies
      shell: bash
      run: |
        if [ "${{ inputs.install-dev }}" = "true" ]; then
          uv sync --extra dev
        else
          uv sync
        fi
