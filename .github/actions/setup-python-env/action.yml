name: "Setup Python Environment"
description: "Setup Python with uv and install dependencies"

inputs:
  python-version:
    description: "Python version to install"
    required: false
    default: "3.12"
  install-dev:
    description: "Install dev dependencies"
    required: false
    default: "true"
  cache-key-suffix:
    description: "Additional cache key suffix"
    required: false
    default: ""

outputs:
  python-version:
    description: "Python version installed"
    value: ${{ steps.setup.outputs.python-version }}
  cache-hit:
    description: "Whether the cache was hit"
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python
      id: setup
      shell: bash
      run: |
        uv python install ${{ inputs.python-version }}
        echo "python-version=${{ inputs.python-version }}" >> "$GITHUB_OUTPUT"

    # Cache GitHub Actions hébergé : à éviter sur runner self-hosted qui
    # fournit déjà un cache persistant (ex: ARC + PVC NFS via UV_CACHE_DIR).
    # Sinon actions/cache écrase le NFS local avec un download WAN à chaque
    # run et ré-upload à la fin → annule le bénéfice du cache persistant.
    - name: Cache dependencies
      id: cache
      if: env.UV_CACHE_DIR == ''
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          .venv
        key: python-${{ inputs.python-version }}-uv-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}${{ inputs.cache-key-suffix }}
        restore-keys: |
          python-${{ inputs.python-version }}-uv-

    - name: Install dependencies
      shell: bash
      run: |
        if [ "${{ inputs.install-dev }}" = "true" ]; then
          uv sync --extra dev
        else
          uv sync
        fi
