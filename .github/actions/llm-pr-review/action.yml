name: "LLM PR Review"
description: "AI-powered PR review using local LLM (llama.cpp OpenAI-compatible endpoint)"

inputs:
  llm-base-url:
    description: "OpenAI-compatible LLM endpoint"
    required: false
    default: "http://llama-cpp-dual.mlops.svc:8080/v1"
  llm-api-key:
    description: "API key for the LLM endpoint (llama.cpp accepts any non-empty value)"
    required: false
    default: "not-needed"
  llm-model:
    description: "Model name or alias (qwen35, nemo3)"
    required: false
    default: "qwen35"
  github-token:
    description: "GitHub token with pull-requests:write permission"
    required: true
  max-diff-chars:
    description: "Maximum diff size in characters before skipping review"
    required: false
    default: "120000"
  exclude-patterns:
    description: "File glob patterns to exclude from diff (one per line)"
    required: false
    default: |
      *.lock
      *.sum
      *.min.js
      *.min.css
      *.pdf
      *.png
      *.jpg
      *.jpeg
      *.svg
      *.woff*
      *.ttf
      *.eot
      package-lock.json
      yarn.lock
      go.sum
      pnpm-lock.yaml
      *.generated.*
      *.pb.go
      .github/**
  review-context:
    description: "Optional project-specific review instructions (overrides REVIEW.md)"
    required: false
    default: ""
  confidence-threshold:
    description: "Minimum confidence (1-10) to report an issue. Issues below this are filtered out."
    required: false
    default: "8"
  temperature:
    description: "LLM temperature (lower = more deterministic)"
    required: false
    default: "0.2"
  max-tokens:
    description: "Maximum response tokens"
    required: false
    default: "8000"
  timeout:
    description: "LLM request timeout in seconds"
    required: false
    default: "300"

outputs:
  review-posted:
    description: "Whether a review comment was posted"
    value: ${{ steps.post-review.outputs.posted }}
  review-score:
    description: "Overall review score (1-10)"
    value: ${{ steps.parse-review.outputs.score }}
  issues-found:
    description: "Number of issues found"
    value: ${{ steps.parse-review.outputs.issues_count }}
  review-summary:
    description: "Brief summary of the review"
    value: ${{ steps.parse-review.outputs.summary }}
  skipped:
    description: "Whether the review was skipped"
    value: ${{ steps.check-diff.outputs.skip }}
  skip-reason:
    description: "Reason for skipping (if applicable)"
    value: ${{ steps.check-diff.outputs.skip_reason }}

runs:
  using: "composite"
  steps:
    # ── Step 1: Health check the LLM endpoint ──
    - name: Check LLM endpoint health
      id: health
      shell: bash
      run: |
        echo "::group::LLM Health Check"
        BASE="${{ inputs.llm-base-url }}"
        # Try /health (llama.cpp native)
        HEALTH_URL="${BASE%/v1}/health"
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$HEALTH_URL" 2>/dev/null || echo "000")

        if [ "$HTTP_CODE" != "200" ]; then
          # Fallback: try /v1/models
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${BASE}/models" 2>/dev/null || echo "000")
        fi

        if [ "$HTTP_CODE" = "200" ]; then
          echo "status=healthy" >> "$GITHUB_OUTPUT"
          echo "LLM endpoint is healthy"
        else
          echo "status=unhealthy" >> "$GITHUB_OUTPUT"
          echo "::warning::LLM endpoint returned HTTP $HTTP_CODE - review will be skipped"
        fi
        echo "::endgroup::"

    # ── Step 2: Load project review context (REVIEW.md) ──
    - name: Load review context
      id: review-context
      shell: bash
      run: |
        CONTEXT=""
        if [ -n "${{ inputs.review-context }}" ]; then
          CONTEXT="${{ inputs.review-context }}"
        elif [ -f "REVIEW.md" ]; then
          CONTEXT=$(cat REVIEW.md)
          echo "Loaded REVIEW.md from repository"
        fi

        if [ -n "$CONTEXT" ]; then
          echo "has_context=true" >> "$GITHUB_OUTPUT"
          echo "$CONTEXT" > /tmp/review-context.txt
        else
          echo "has_context=false" >> "$GITHUB_OUTPUT"
        fi

    # ── Step 3: Extract and filter PR diff ──
    - name: Extract PR diff
      id: check-diff
      shell: bash
      run: |
        echo "::group::Extract PR Diff"

        if [ "${{ steps.health.outputs.status }}" != "healthy" ]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "skip_reason=LLM endpoint is not reachable" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
          exit 0
        fi

        BASE_SHA="${{ github.event.pull_request.base.sha }}"
        HEAD_SHA="${{ github.event.pull_request.head.sha }}"

        # Build pathspec exclusions
        PATHSPEC_ARGS=""
        while IFS= read -r pattern; do
          pattern=$(echo "$pattern" | xargs)
          [ -z "$pattern" ] && continue
          PATHSPEC_ARGS="$PATHSPEC_ARGS ':!$pattern'"
        done <<< "${{ inputs.exclude-patterns }}"

        DIFF=$(eval git diff "$BASE_SHA...$HEAD_SHA" -- . $PATHSPEC_ARGS 2>/dev/null || true)

        if [ -z "$DIFF" ]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "skip_reason=No relevant changes found in diff" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
          exit 0
        fi

        DIFF_SIZE=${#DIFF}
        echo "Diff size: $DIFF_SIZE characters"

        if [ "$DIFF_SIZE" -gt "${{ inputs.max-diff-chars }}" ]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "skip_reason=Diff too large (${DIFF_SIZE} chars, limit: ${{ inputs.max-diff-chars }})" >> "$GITHUB_OUTPUT"
          echo "::warning::Skipping AI review: diff too large"
          echo "::endgroup::"
          exit 0
        fi

        echo "skip=false" >> "$GITHUB_OUTPUT"
        # Sanitize diff: remove null bytes and non-printable control chars (keep tabs/newlines)
        echo "$DIFF" | tr -d '\000-\010\013\014\016-\037' > /tmp/pr-diff.patch
        echo "diff_size=$DIFF_SIZE" >> "$GITHUB_OUTPUT"
        echo "::endgroup::"

    # ── Step 4: Call LLM for review ──
    - name: Call LLM for review
      id: llm-call
      if: steps.check-diff.outputs.skip != 'true'
      shell: bash
      run: |
        echo "::group::LLM Review"

        PR_TITLE="${{ github.event.pull_request.title }}"

        # Write system prompt to file to avoid shell escaping issues
        cat > /tmp/system-prompt.txt << 'SYSTEMPROMPT'
        You are a senior software engineer conducting a focused code review on a pull request diff.

        ## Your mission
        Find REAL bugs, security vulnerabilities, and logic errors introduced by THIS pull request. Quality over quantity — only report issues you are genuinely confident about.

        ## What to look for (in priority order)
        1. **Security vulnerabilities**: SQL/command injection, credential exposure, auth bypasses, path traversal — only where user-controlled input reaches a dangerous sink
        2. **Bugs and logic errors**: Off-by-one, null/undefined access, race conditions, wrong comparisons, unreachable code
        3. **Error handling gaps**: Unhandled exceptions that would crash in production, swallowed errors hiding failures
        4. **Data integrity**: Silent data loss, incorrect type coercions, missing validation at system boundaries (user input, external APIs)

        ## Confidence requirement
        For each issue, assign a confidence score from 1 to 10. Only report issues where your confidence is >= 8. If you are not confident, DO NOT report it.

        ## False positive rules — DO NOT report these
        - URLs, hostnames, ports, or endpoint paths in configuration files — these are NOT credential exposure
        - Internal service URLs (*.svc, *.local, *.internal, private IPs) — these are trusted infrastructure
        - Environment variables and config files — these are trusted values, not secrets
        - CI/CD workflow files, Dockerfiles, Makefiles — unless there is actual command injection from user input
        - Code style, formatting, naming conventions — linters handle this
        - Missing tests or documentation — out of scope
        - Performance suggestions without evidence of actual impact
        - Pre-existing issues not introduced by this PR
        - Generic advice that applies to any codebase (add retry logic, add caching, etc.)
        - TODOs, FIXMEs in comments — these are intentional markers

        ## Severity classification
        - **critical**: Exploitable security vulnerability, data loss, or crash in production. Must be fixed before merge.
        - **warning**: Real bug or correctness issue that should be fixed but won't cause immediate harm.
        - **suggestion**: Genuine improvement that materially reduces risk or improves correctness. NOT style preferences.

        ## Scoring (1-10)
        - 9-10: Clean code, no real issues found
        - 7-8: Minor issues, mostly good
        - 5-6: Some real concerns that should be addressed
        - 3-4: Significant bugs or security issues
        - 1-2: Critical vulnerabilities or broken logic

        If the code is good, say so. A score of 9-10 with zero issues is a perfectly valid review. Do not invent issues to justify a lower score.

        ## Required JSON output format
        You MUST respond with a single JSON object (no markdown, no explanation, just JSON) with this exact structure:
        {
          "summary": "2-3 sentence overview of the changes and their quality",
          "score": 7,
          "issues": [
            {
              "severity": "critical|warning|suggestion",
              "file": "path/to/file.py",
              "description": "What the issue is and why it matters",
              "confidence": 9
            }
          ],
          "approved": true
        }
        - severity: "critical" (must fix), "warning" (should fix), "suggestion" (nice to fix)
        - confidence: 1-10, only include issues with confidence >= 8
        - approved: true if no critical or warning issues
        - If no issues found, use an empty array: "issues": []
        SYSTEMPROMPT

        # Append project-specific context if available
        if [ "${{ steps.review-context.outputs.has_context }}" = "true" ]; then
          echo "" >> /tmp/system-prompt.txt
          echo "## Project-specific review instructions" >> /tmp/system-prompt.txt
          cat /tmp/review-context.txt >> /tmp/system-prompt.txt
        fi

        # Build user prompt parts as files (avoid shell interpolation issues)
        printf '%s' "Review this pull request." > /tmp/user-prompt.txt
        printf '\n\nTitle: %s' "$PR_TITLE" >> /tmp/user-prompt.txt
        printf '\nDescription: %s' "${{ github.event.pull_request.body }}" >> /tmp/user-prompt.txt
        printf '\n\nRespond ONLY with the JSON object. No thinking, no explanation, no markdown wrapping. Just the raw JSON.' >> /tmp/user-prompt.txt

        # Build JSON payload with jq using --rawfile (write to file to preserve escaping)
        jq -n \
          --arg model "${{ inputs.llm-model }}" \
          --rawfile system_prompt /tmp/system-prompt.txt \
          --rawfile user_prompt /tmp/user-prompt.txt \
          --rawfile diff /tmp/pr-diff.patch \
          --argjson temp ${{ inputs.temperature }} \
          --argjson max_tokens ${{ inputs.max-tokens }} \
          '{
            model: $model,
            messages: [
              {
                role: "system",
                content: $system_prompt
              },
              {
                role: "user",
                content: ($user_prompt + "\n\nDiff:\n```diff\n" + $diff + "\n```")
              }
            ],
            temperature: $temp,
            max_tokens: $max_tokens,
            response_format: { type: "json_object" }
          }' > /tmp/llm-payload.json

        echo "Payload size: $(wc -c < /tmp/llm-payload.json) bytes"

        # Call LLM with retry (use @file for both request and response)
        for attempt in 1 2 3; do
          HTTP_CODE=$(curl -s -o /tmp/llm-response.json -w "%{http_code}" \
            --max-time "${{ inputs.timeout }}" \
            "${{ inputs.llm-base-url }}/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ inputs.llm-api-key }}" \
            -d @/tmp/llm-payload.json 2>/dev/null)
          [ "$HTTP_CODE" = "200" ] && break
          echo "Attempt $attempt failed (HTTP $HTTP_CODE), retrying in $((attempt * 5))s..."
          sleep $((attempt * 5))
        done

        if [ "$HTTP_CODE" != "200" ]; then
          echo "error=true" >> "$GITHUB_OUTPUT"
          echo "::error::LLM call failed after 3 attempts (HTTP $HTTP_CODE)"
          cat /tmp/llm-response.json 2>/dev/null || true
          echo "::endgroup::"
          exit 0
        fi

        # Extract content — handle both standard and thinking models
        # Thinking models (Qwen3, etc.) put reasoning in reasoning_content and answer in content
        CONTENT=$(jq -r '.choices[0].message.content // empty' /tmp/llm-response.json)
        if [ -z "$CONTENT" ]; then
          echo "error=true" >> "$GITHUB_OUTPUT"
          echo "::error::LLM response has no content"
          jq . /tmp/llm-response.json 2>/dev/null || cat /tmp/llm-response.json
          echo "::endgroup::"
          exit 0
        fi

        # Extract JSON from content (model may wrap in markdown ```json blocks)
        CLEAN_JSON=$(echo "$CONTENT" | sed -n '/^```json/,/^```$/p' | sed '1d;$d')
        if [ -z "$CLEAN_JSON" ]; then
          # No markdown wrapping, try content directly
          CLEAN_JSON="$CONTENT"
        fi

        # Validate JSON
        if ! echo "$CLEAN_JSON" | jq empty 2>/dev/null; then
          echo "error=true" >> "$GITHUB_OUTPUT"
          echo "::error::LLM returned invalid JSON"
          echo "$CONTENT" | head -20
          echo "::endgroup::"
          exit 0
        fi

        echo "$CLEAN_JSON" > /tmp/review-content.json
        echo "error=false" >> "$GITHUB_OUTPUT"

        # Log token usage
        PROMPT_TOKENS=$(jq -r '.usage.prompt_tokens // "?"' /tmp/llm-response.json)
        COMPLETION_TOKENS=$(jq -r '.usage.completion_tokens // "?"' /tmp/llm-response.json)
        echo "Tokens: prompt=$PROMPT_TOKENS completion=$COMPLETION_TOKENS"
        echo "::endgroup::"

    # ── Step 5: Parse and filter review ──
    - name: Parse and filter review output
      id: parse-review
      if: steps.check-diff.outputs.skip != 'true' && steps.llm-call.outputs.error != 'true'
      shell: bash
      run: |
        REVIEW=$(cat /tmp/review-content.json)
        THRESHOLD=${{ inputs.confidence-threshold }}

        # Filter issues by confidence threshold
        TOTAL_BEFORE=$(echo "$REVIEW" | jq '.issues | length')
        FILTERED=$(echo "$REVIEW" | jq --argjson threshold "$THRESHOLD" '
          .issues = [.issues[] | select(.confidence >= $threshold)]
        ')
        TOTAL_AFTER=$(echo "$FILTERED" | jq '.issues | length')
        DROPPED=$((TOTAL_BEFORE - TOTAL_AFTER))

        if [ "$DROPPED" -gt 0 ]; then
          echo "Filtered out $DROPPED low-confidence issues (threshold: $THRESHOLD/10)"
        fi

        # Recalculate approved based on filtered issues
        HAS_BLOCKING=$(echo "$FILTERED" | jq '[.issues[] | select(.severity == "critical" or .severity == "warning")] | length')
        if [ "$HAS_BLOCKING" -eq 0 ]; then
          FILTERED=$(echo "$FILTERED" | jq '.approved = true')
        fi

        # Write filtered review back
        echo "$FILTERED" > /tmp/review-content.json

        SUMMARY=$(echo "$FILTERED" | jq -r '.summary // "Review completed"')
        SCORE=$(echo "$FILTERED" | jq -r '.score // 0')
        APPROVED=$(echo "$FILTERED" | jq -r '.approved // false')
        ISSUES_COUNT=$(echo "$FILTERED" | jq '.issues | length')

        echo "summary<<EOFSUM" >> "$GITHUB_OUTPUT"
        echo "$SUMMARY" >> "$GITHUB_OUTPUT"
        echo "EOFSUM" >> "$GITHUB_OUTPUT"
        echo "score=$SCORE" >> "$GITHUB_OUTPUT"
        echo "approved=$APPROVED" >> "$GITHUB_OUTPUT"
        echo "issues_count=$ISSUES_COUNT" >> "$GITHUB_OUTPUT"
        echo "filtered_count=$DROPPED" >> "$GITHUB_OUTPUT"

    # ── Step 6: Format and post review comment ──
    - name: Post review comment
      id: post-review
      if: steps.check-diff.outputs.skip != 'true' && steps.llm-call.outputs.error != 'true'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');

          let review;
          try {
            review = JSON.parse(fs.readFileSync('/tmp/review-content.json', 'utf8'));
          } catch (e) {
            core.warning('Failed to parse review JSON: ' + e.message);
            core.setOutput('posted', 'false');
            return;
          }

          const score = review.score || 0;
          const emoji = score >= 8 ? '\u2705' : score >= 5 ? '\u26a0\ufe0f' : '\ud83d\udea8';
          const status = review.approved ? 'Approved' : 'Changes suggested';
          const filtered = parseInt(process.env.FILTERED_COUNT || '0');

          let body = `## ${emoji} AI Code Review\n\n`;
          body += `**Score**: ${score}/10 | **Status**: ${status}\n\n`;
          body += `### Summary\n${review.summary}\n\n`;

          if (review.issues && review.issues.length > 0) {
            body += `### Issues Found (${review.issues.length})\n\n`;

            const grouped = { critical: [], warning: [], suggestion: [] };
            for (const issue of review.issues) {
              const sev = issue.severity || 'suggestion';
              if (!grouped[sev]) grouped[sev] = [];
              grouped[sev].push(issue);
            }

            const sevEmoji = { critical: '\ud83d\udd34', warning: '\ud83d\udfe1', suggestion: '\ud83d\udd35' };
            for (const [sev, issues] of Object.entries(grouped)) {
              if (issues.length === 0) continue;
              const label = sev.charAt(0).toUpperCase() + sev.slice(1);
              body += `#### ${sevEmoji[sev]} ${label} (${issues.length})\n`;
              for (const issue of issues) {
                const conf = issue.confidence ? ` (confidence: ${issue.confidence}/10)` : '';
                body += `- **\`${issue.file}\`**: ${issue.description}${conf}\n`;
              }
              body += '\n';
            }
          } else {
            body += `### No Issues Found\nThe code looks good! No significant issues detected.\n\n`;
          }

          body += `---\n`;
          const parts = [`Reviewed by **${process.env.LLM_MODEL}** via llama.cpp`];
          parts.push(`Diff: ${process.env.DIFF_SIZE || '?'} chars`);
          parts.push(`Confidence threshold: ${process.env.CONFIDENCE_THRESHOLD}/10`);
          if (filtered > 0) parts.push(`${filtered} low-confidence issues filtered out`);
          body += `<sub>${parts.join(' | ')}</sub>`;

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: body
          });

          core.setOutput('posted', 'true');
      env:
        DIFF_SIZE: ${{ steps.check-diff.outputs.diff_size }}
        LLM_MODEL: ${{ inputs.llm-model }}
        FILTERED_COUNT: ${{ steps.parse-review.outputs.filtered_count }}
        CONFIDENCE_THRESHOLD: ${{ inputs.confidence-threshold }}

    # ── Step 7: Post skip notification ──
    - name: Post skip notification
      if: steps.check-diff.outputs.skip == 'true'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: `## \u23ed\ufe0f AI Review Skipped\n\n**Reason**: ${{ steps.check-diff.outputs.skip_reason }}\n\n<sub>llama.cpp AI reviewer</sub>`
          });
      continue-on-error: true

    # ── Step 8: Summary ──
    - name: Create step summary
      if: always()
      shell: bash
      run: |
        cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
        ## AI PR Review

        | Metric | Value |
        |--------|-------|
        | **Skipped** | ${{ steps.check-diff.outputs.skip || 'false' }} |
        | **Score** | ${{ steps.parse-review.outputs.score || 'N/A' }}/10 |
        | **Issues** | ${{ steps.parse-review.outputs.issues_count || 'N/A' }} |
        | **Filtered out** | ${{ steps.parse-review.outputs.filtered_count || '0' }} |
        | **Approved** | ${{ steps.parse-review.outputs.approved || 'N/A' }} |
        | **Diff Size** | ${{ steps.check-diff.outputs.diff_size || 'N/A' }} chars |
        | **Confidence Threshold** | ${{ inputs.confidence-threshold }}/10 |
        | **Model** | ${{ inputs.llm-model }} |
        EOF
