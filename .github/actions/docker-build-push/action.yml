name: "Docker Build & Push"
description: "Build, scan, and optionally push Docker image with security scanning"

inputs:
  image-name:
    description: "Docker image name (e.g., username/myapp)"
    required: true
  image-tag:
    description: "Docker image tag"
    required: true
  dockerfile:
    description: "Path to Dockerfile"
    required: false
    default: "Dockerfile"
  dockerfile-target:
    description: "Dockerfile target stage (e.g., api, frontend). Leave empty for single-stage."
    required: false
    default: ""
  context:
    description: "Docker build context path"
    required: false
    default: "."
  registry:
    description: "Docker registry"
    required: false
    default: "docker.io"
  registry-username:
    description: "Docker registry username"
    required: false
  registry-password:
    description: "Docker registry password"
    required: false
  platforms:
    description: "Target platforms for build"
    required: false
    default: "linux/amd64,linux/arm64"
  push:
    description: "Push image to registry"
    required: false
    default: "false"
  scan:
    description: "Run Trivy security scan"
    required: false
    default: "true"
  scan-severity:
    description: "Trivy scan severity levels"
    required: false
    default: "CRITICAL,HIGH,MEDIUM"
  sign:
    description: "Sign image with Cosign (keyless)"
    required: false
    default: "false"
  sbom:
    description: "Generate SBOM"
    required: false
    default: "false"
  provenance:
    description: "Generate provenance attestation"
    required: false
    default: "false"
  cache-scope:
    description: "GitHub Actions cache scope"
    required: false
    default: "docker"
  labels:
    description: "Additional OCI labels (multiline)"
    required: false
    default: ""
  add-latest-tag:
    description: "Also tag as latest"
    required: false
    default: "false"
  build-args:
    description: "Docker build arguments (multiline KEY=VALUE)"
    required: false
    default: ""

outputs:
  digest:
    description: "Built image digest"
    value: ${{ steps.build.outputs.digest }}
  image-full-name:
    description: "Full image name with tag"
    value: ${{ steps.meta.outputs.full-name }}
  vulnerabilities-found:
    description: "Number of vulnerabilities found"
    value: ${{ steps.scan-results.outputs.vuln-count }}

runs:
  using: "composite"
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: image=moby/buildkit:buildx-stable-1

    - name: Login to Docker Registry
      if: inputs.push == 'true' && inputs.registry-username != '' && inputs.registry-password != ''
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    - name: Prepare image metadata
      id: meta
      shell: bash
      run: |
        FULL_NAME="${{ inputs.image-name }}:${{ inputs.image-tag }}"
        echo "full-name=${FULL_NAME}" >> "$GITHUB_OUTPUT"

        TAGS="${{ inputs.image-name }}:${{ inputs.image-tag }}"
        if [ "${{ inputs.add-latest-tag }}" = "true" ]; then
          TAGS="${TAGS},${{ inputs.image-name }}:latest"
        fi
        echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

        # Target name for file naming (use tag if no target)
        TARGET="${{ inputs.dockerfile-target }}"
        if [ -z "$TARGET" ]; then
          TARGET="image"
        fi
        echo "target-name=${TARGET}" >> "$GITHUB_OUTPUT"
        echo "sarif-file=trivy-${TARGET}-results.sarif" >> "$GITHUB_OUTPUT"

    - name: Install Cosign
      if: inputs.sign == 'true'
      uses: sigstore/cosign-installer@v3
      with:
        cosign-release: "v2.2.4"

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        target: ${{ inputs.dockerfile-target || '' }}
        platforms: ${{ inputs.push == 'true' && inputs.platforms || '' }}
        push: ${{ inputs.push }}
        load: ${{ inputs.push != 'true' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ inputs.labels }}
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha,scope=${{ inputs.cache-scope }}
        cache-to: type=gha,mode=max,scope=${{ inputs.cache-scope }}
        sbom: ${{ inputs.sbom }}
        provenance: ${{ inputs.provenance == 'true' && 'mode=max' || 'false' }}

    - name: Sign image with Cosign
      if: inputs.sign == 'true' && inputs.push == 'true'
      shell: bash
      run: cosign sign --yes "${{ inputs.image-name }}@${{ steps.build.outputs.digest }}"

    - name: Verify signature
      if: inputs.sign == 'true' && inputs.push == 'true'
      shell: bash
      run: |
        cosign verify \
          --certificate-identity-regexp="https://github.com/${{ github.repository_owner }}/" \
          --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
          "${{ inputs.image-name }}@${{ steps.build.outputs.digest }}"

    - name: Run Trivy vulnerability scanner
      if: inputs.scan == 'true'
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.meta.outputs.full-name }}
        format: "sarif"
        output: ${{ steps.meta.outputs.sarif-file }}
        severity: ${{ inputs.scan-severity }}

    - name: Upload Trivy scan results
      if: inputs.scan == 'true'
      uses: github/codeql-action/upload-sarif@v4
      continue-on-error: true
      with:
        sarif_file: ${{ steps.meta.outputs.sarif-file }}
        category: trivy-${{ steps.meta.outputs.target-name }}-scan

    - name: Analyze scan results
      id: scan-results
      if: inputs.scan == 'true'
      shell: bash
      run: |
        SARIF_FILE="${{ steps.meta.outputs.sarif-file }}"
        if [ -f "$SARIF_FILE" ]; then
          VULN_COUNT=$(jq '.runs[0].results | length' "$SARIF_FILE" 2>/dev/null || echo 0)
          echo "vuln-count=${VULN_COUNT}" >> "$GITHUB_OUTPUT"
        else
          echo "vuln-count=0" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload scan artifacts
      if: inputs.scan == 'true'
      uses: actions/upload-artifact@v6
      with:
        name: docker-scan-${{ steps.meta.outputs.target-name }}
        path: ${{ steps.meta.outputs.sarif-file }}
        retention-days: 7